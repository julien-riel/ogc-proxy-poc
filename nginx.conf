server {
    listen 80;

    # MapStore UI
    location /mapstore/ {
        proxy_pass http://mapstore:8080/mapstore/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WFS proxy
    location /wfs {
        proxy_pass http://proxy:3000/wfs;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # OGC API Features proxy
    location /ogc/ {
        proxy_pass http://proxy:3000/ogc/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Default redirect to MapStore
    location / {
        return 302 /mapstore/;
    }
}
