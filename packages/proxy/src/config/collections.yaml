collections:
  bornes-fontaines:
    title: "Bornes-fontaines"
    description: "Bornes-fontaines municipales"
    upstream:
      baseUrl: "${UPSTREAM_HOST}/api/bornes-fontaines"
      method: GET
      pagination:
        type: "offset-limit"
        offsetParam: "offset"
        limitParam: "limit"
      responseMapping:
        items: "data"
        total: "total"
        item: "data"
    geometry:
      type: Point
      xField: "x"
      yField: "y"
    idField: "id"
    properties:
      - name: "etat"
        type: "string"
      - name: "arrondissement"
        type: "string"

  pistes-cyclables:
    title: "Pistes cyclables"
    description: "Réseau cyclable municipal"
    upstream:
      baseUrl: "${UPSTREAM_HOST}/api/pistes-cyclables"
      method: GET
      pagination:
        type: "page-pageSize"
        pageParam: "page"
        pageSizeParam: "pageSize"
      responseMapping:
        items: "results"
        total: "count"
        item: "result"
    geometry:
      type: LineString
      coordsField: "geometry.coords"
    idField: "id"
    properties:
      - name: "nom"
        type: "string"
      - name: "type"
        type: "string"
      - name: "longueur"
        type: "double"

  arrondissements:
    title: "Arrondissements"
    description: "Arrondissements de la ville"
    upstream:
      baseUrl: "${UPSTREAM_HOST}/api/arrondissements"
      method: GET
      pagination:
        type: "cursor"
        cursorParam: "cursor"
        limitParam: "limit"
        nextCursorField: "nextCursor"
      responseMapping:
        items: "items"
        total: null
        item: "item"
    geometry:
      type: Polygon
      wktField: "wkt"
    idField: "code"
    properties:
      - name: "nom"
        type: "string"
      - name: "population"
        type: "int"
