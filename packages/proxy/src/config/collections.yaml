defaults:
  maxPageSize: 1000
  maxFeatures: 10000

collections:
  bornes-fontaines:
    title: "Bornes-fontaines"
    description: "Bornes-fontaines municipales"
    upstream:
      type: "rest"
      baseUrl: "${UPSTREAM_HOST}/api/bornes-fontaines"
      method: GET
      pagination:
        type: "offset-limit"
        offsetParam: "offset"
        limitParam: "limit"
      responseMapping:
        items: "data"
        total: "total"
        item: "data"
      spatialCapabilities:
        - "bbox"
    geometry:
      type: Point
      xField: "x"
      yField: "y"
    idField: "id"
    properties:
      - name: "etat"
        type: "string"
        filterable: true
        upstream:
          param: "etat"
          operators: ["="]
      - name: "arrondissement"
        type: "string"
        filterable: true
        upstream:
          param: "arrondissement"
          operators: ["="]

  pistes-cyclables:
    title: "Pistes cyclables"
    description: "Reseau cyclable municipal"
    upstream:
      type: "rest"
      baseUrl: "${UPSTREAM_HOST}/api/pistes-cyclables"
      method: GET
      pagination:
        type: "page-pageSize"
        pageParam: "page"
        pageSizeParam: "pageSize"
      responseMapping:
        items: "results"
        total: "count"
        item: "result"
      spatialCapabilities:
        - "bbox"
    geometry:
      type: LineString
      coordsField: "geometry.coords"
    idField: "id"
    properties:
      - name: "nom"
        type: "string"
        filterable: true
        upstream:
          param: "nom"
          operators: ["="]
      - name: "type"
        type: "string"
        filterable: true
        upstream:
          param: "type"
          operators: ["="]
      - name: "longueur"
        type: "double"
        filterable: true

  arrondissements:
    title: "Arrondissements"
    description: "Arrondissements de la ville"
    upstream:
      type: "rest"
      baseUrl: "${UPSTREAM_HOST}/api/arrondissements"
      method: GET
      pagination:
        type: "cursor"
        cursorParam: "cursor"
        limitParam: "limit"
        nextCursorField: "nextCursor"
      responseMapping:
        items: "items"
        total: null
        item: "item"
      spatialCapabilities:
        - "bbox"
    geometry:
      type: Polygon
      wktField: "wkt"
    idField: "code"
    properties:
      - name: "nom"
        type: "string"
        filterable: true
        upstream:
          param: "nom"
          operators: ["="]
      - name: "population"
        type: "int"
        filterable: true
        sortable: true

  mrc-quebec:
    title: "MRC du Quebec"
    description: "Municipalites regionales de comte du Quebec (PAVICS Ouranos)"
    plugin: "wfs-upstream"
    upstream:
      type: "wfs"
      baseUrl: "https://pavics.ouranos.ca/geoserver/wfs"
      typeName: "public:quebec_mrc_boundaries"
      version: "1.1.0"
      method: GET
      pagination:
        type: "offset-limit"
        offsetParam: "startIndex"
        limitParam: "count"
      responseMapping:
        items: "features"
        total: "totalFeatures"
        item: "features.0"
      spatialCapabilities:
        - "bbox"
        - "intersects"
        - "within"
        - "dwithin"
    geometry:
      type: Polygon
    idField: "id"
    properties:
      - name: "NOM_MRC"
        type: "string"
        filterable: true
        sortable: true
      - name: "RES_CO_MRC"
        type: "string"
        filterable: true
