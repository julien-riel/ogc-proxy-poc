# OGC Proxy — Collection Configuration
#
# Each collection maps an upstream REST API to an OGC API Features endpoint.
# Environment variables can be used with ${VAR_NAME} syntax.
#
# Full documentation: see guide-integration.md in the main repository.

# Optional: JWT authentication
# security:
#   jwt:
#     enabled: true
#     host: "${JWT_HOST}"
#     endpoint: "${JWT_ENDPOINT}"

# Optional: default limits
# defaults:
#   maxPageSize: 1000
#   maxFeatures: 10000

collections:
  # Example: a simple REST API with Point geometry
  my-points:
    title: "My Points of Interest"
    description: "Example point collection — replace with your API"
    extent:
      spatial: [-180, -90, 180, 90]
    upstream:
      type: "rest"
      baseUrl: "${UPSTREAM_HOST}/api/points"
      method: GET
      pagination:
        type: "offset-limit"
        offsetParam: "offset"
        limitParam: "limit"
      responseMapping:
        items: "data"
        total: "total"
        item: "data"
    geometry:
      type: Point
      xField: "longitude"
      yField: "latitude"
    idField: "id"
    properties:
      - name: "name"
        type: "string"
        filterable: true
      - name: "category"
        type: "string"
        filterable: true

  # Example: a REST API with LineString geometry and page-based pagination
